<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stonescript Editor</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0e1012;--bg-panel:#111315;--bg-header:#0c0d0f;
  --border:#1e2022;--border2:#252525;
  --gutter-bg:#0c0d0f;--gutter-fg:#2e3235;--gutter-act:#5a6570;
  --line-active:rgba(255,255,255,0.028);--line-warn:rgba(201,107,107,0.10);
  --ok:#5a7a5a;--err:#c96b6b;--accent:#7ab4d4;
  --font:'Courier New',Courier,monospace;--fs:13px;--lh:1.65;--pad:12px;
}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:#bbb;font-family:var(--font);font-size:var(--fs);display:flex;flex-direction:column;}
#header{flex-shrink:0;display:flex;align-items:center;gap:16px;padding:8px 16px;background:var(--bg-header);border-bottom:1px solid var(--border2);user-select:none;}
#header h1{font-size:11px;color:#555;font-weight:normal;letter-spacing:.12em;}
#status{margin-left:auto;font-size:11px;color:#444;}
#status.ok{color:var(--ok);}#status.err{color:var(--err);}
#body{flex:1;overflow:hidden;min-height:0;display:flex;flex-direction:column;}
#editor-outer{flex:1;display:flex;overflow:hidden;min-height:0;}
#gutter{flex-shrink:0;background:var(--gutter-bg);border-right:1px solid var(--border);overflow:hidden;position:relative;user-select:none;min-width:44px;}
#gutter-inner{position:absolute;top:0;left:0;right:0;padding-top:var(--pad);font-family:var(--font);font-size:var(--fs);line-height:var(--lh);}
.gn{display:block;text-align:right;padding:0 10px 0 6px;color:var(--gutter-fg);white-space:nowrap;}
.gn.act{color:var(--gutter-act);}
.gn.warn{color:var(--err);}
#editor-scroll{flex:1;position:relative;overflow:auto;min-height:0;background:var(--bg);}
#editor-scroll::-webkit-scrollbar{width:6px;height:6px;}
#editor-scroll::-webkit-scrollbar-thumb{background:#222;border-radius:2px;}
#highlight,#input{
  font-family:var(--font);font-size:var(--fs);line-height:var(--lh);
  padding:var(--pad) 14px;white-space:pre;tab-size:2;
  border:none;outline:none;margin:0;letter-spacing:normal;word-spacing:normal;
}
#highlight{position:relative;display:block;min-width:100%;color:transparent;pointer-events:none;background:transparent;overflow:visible;}
#input{position:absolute;top:0;left:0;width:100%;resize:none;background:transparent;color:rgba(0,0,0,0);caret-color:#bbb;overflow:hidden;z-index:2;}
#input::selection{background:rgba(122,180,212,0.22);}
.hl-line{display:block;}
.hl-line.active{background:var(--line-active);}
.hl-line.warn{background:var(--line-warn);}
.control{color:#e0e0e0;font-weight:bold;}.comment{color:#4e6e4e;font-style:italic;}
.continue-op{color:#666;}.command{color:#9acdaa;}.keyword{color:var(--accent);}
.print{color:#9acdaa;font-weight:bold;}.variable{color:#c8c8c8;}.function{color:#5ab4d4;}
.operator{color:#777;}.number{color:#c5b07a;}.string{color:#8a7a6a;}
.identifier{color:#aaa;}.paren{color:#555;}.bracket{color:#555;}
/* warnings: sólo color de fondo en la línea, sin texto extra en el highlight */
#tooltip{position:fixed;z-index:300;background:#180c0c;border:1px solid #c96b6b55;color:var(--err);font-size:11px;font-family:var(--font);padding:5px 10px;border-radius:2px;pointer-events:none;display:none;max-width:360px;white-space:normal;line-height:1.5;}
#ac{position:fixed;z-index:200;background:#141618;border:1px solid #2a3035;border-radius:3px;display:none;max-height:210px;overflow-y:auto;min-width:230px;box-shadow:0 8px 24px rgba(0,0,0,.65);}
#ac::-webkit-scrollbar{width:4px;}#ac::-webkit-scrollbar-thumb{background:#222;}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;color:#333;letter-spacing:.14em;}
.aci{display:flex;align-items:baseline;gap:10px;padding:5px 11px;cursor:pointer;font-size:12px;border-bottom:1px solid #1a1c1e;font-family:var(--font);}
.aci:last-child{border-bottom:none;}.aci:hover,.aci.sel{background:#1e2428;}
.aci-name{color:#c8c8c8;font-weight:bold;min-width:130px;}
.aci-kind{color:#3a5060;font-size:10px;letter-spacing:.05em;}.aci-m{color:var(--accent);}
#wbar{flex-shrink:0;background:var(--bg-header);border-top:1px solid var(--border);overflow:hidden;max-height:22px;transition:max-height .18s ease;}
#wbar.open{max-height:170px;}
#wbar-hdr{display:flex;align-items:center;gap:8px;padding:4px 12px;cursor:pointer;user-select:none;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#333;}
#wbar-hdr .wc{color:var(--err);margin-left:4px;}#wbar-hdr .wt{margin-left:auto;color:#2a2a2a;}
#wlist{max-height:144px;overflow-y:auto;}#wlist::-webkit-scrollbar{width:4px;}#wlist::-webkit-scrollbar-thumb{background:#222;}
.we{display:flex;gap:10px;padding:3px 12px;cursor:pointer;font-size:11px;color:#664444;font-family:var(--font);}
.we:hover{background:#160c0c;color:var(--err);}.we-ln{color:#553333;min-width:38px;}
</style>
</head>
<body>
<div id="loading">cargando stonescript-api.json…</div>
<div id="header" style="display:none"><h1>·:·:· STONESCRIPT EDITOR ·:·:·</h1><div id="status"></div></div>
<div id="body" style="display:none">
  <div id="editor-outer">
    <div id="gutter"><div id="gutter-inner"></div></div>
    <div id="editor-scroll">
      <div id="highlight" aria-hidden="true"></div>
      <textarea id="input" spellcheck="false" autocorrect="off" autocapitalize="off" autocomplete="off"></textarea>
    </div>
  </div>
</div>
<div id="wbar" style="display:none">
  <div id="wbar-hdr"><span>Warnings</span><span class="wc" id="wc"></span><span class="wt" id="wt">▶</span></div>
  <div id="wlist"></div>
</div>
<div id="tooltip"></div>
<div id="ac"></div>

<script src="StonescriptParser.js"></script>
<script>
(async () => {

let api;
try {
  const r = await fetch('stonescript-api.json');
  if (!r.ok) throw new Error('HTTP ' + r.status);
  api = await r.json();
} catch(e) {
  document.getElementById('loading').textContent = 'Error cargando API: ' + e.message;
  return;
}

document.getElementById('loading').style.display = 'none';
['header','body','wbar'].forEach(id => document.getElementById(id).style.display = '');


const parser   = new StonescriptParser(api);
const inputEl  = document.getElementById('input');
const hlEl     = document.getElementById('highlight');
const gutterEl = document.getElementById('gutter');
const gutterIn = document.getElementById('gutter-inner');
const scrollEl = document.getElementById('editor-scroll');
const statusEl = document.getElementById('status');
const tipEl    = document.getElementById('tooltip');
const acEl     = document.getElementById('ac');
const wbar     = document.getElementById('wbar');
const wlist    = document.getElementById('wlist');
const wcEl     = document.getElementById('wc');
const wtEl     = document.getElementById('wt');

// ── AC data ──────────────────────────────────────────────────
const acData = api
  .filter(e => !['operator','control_flow','comment','line_continuation','enum','syntax'].includes(e.type))
  .map(e => ({id:e.id, type:e.type, ret:e.return_type||''}));

// ── State ────────────────────────────────────────────────────
let activeLine = 0;
let warnings   = [];
let acItems    = [];
let acSel      = 0;
let acOpen     = false;
let rafPending = false;
let LH         = 21;  // line height in px, measured below

// ── Measure real line height ─────────────────────────────────
function measureLH() {
  const tmp = document.createElement('div');
  tmp.style.cssText = 'position:absolute;visibility:hidden;pointer-events:none;' +
    'font-family:\'Courier New\',Courier,monospace;font-size:13px;line-height:1.65;' +
    'padding:0;margin:0;white-space:pre;';
  tmp.textContent = 'X';
  document.body.appendChild(tmp);
  LH = tmp.getBoundingClientRect().height;
  document.body.removeChild(tmp);
}
measureLH();

// ── Gutter width: fit widest line number ─────────────────────
function updateGutterWidth(lineCount) {
  const digits = String(lineCount).length;
  const tmp = document.createElement('span');
  tmp.style.cssText = 'position:absolute;visibility:hidden;pointer-events:none;' +
    'font-family:\'Courier New\',Courier,monospace;font-size:11px;';
  tmp.textContent = '0'.repeat(Math.max(digits, 2));
  document.body.appendChild(tmp);
  const w = Math.ceil(tmp.getBoundingClientRect().width) + 22;
  document.body.removeChild(tmp);
  gutterEl.style.width = w + 'px';
}

// ── Scroll sync ───────────────────────────────────────────────
scrollEl.addEventListener('scroll', () => {
  gutterIn.style.transform = `translateY(-${scrollEl.scrollTop}px)`;
});

// ── Schedule render ───────────────────────────────────────────
function scheduleRender() {
  if (!rafPending) { rafPending = true; requestAnimationFrame(doRender); }
}

// ── Render ────────────────────────────────────────────────────
function doRender() {
  rafPending = false;
  const code  = inputEl.value;
  const lines = code.split('\n');

  // Parse full AST for warnings (context-aware)
  warnings = [];
  if (code.trim()) {
    try {
      const blocks = parser.parse(code);
      warnings = collectWarnings(blocks, lines);
    } catch(e) {}
  }

  const wn = warnings.length;
  statusEl.textContent = wn ? wn + ' warning' + (wn > 1 ? 's' : '') : (code.trim() ? 'ok' : '');
  statusEl.className   = wn ? 'err' : (code.trim() ? 'ok' : '');

  updateGutterWidth(lines.length);

  // Render highlight LINE BY LINE — guarantees 1 code line = 1 HTML line
  // even when lines are empty or whitespace-only.
  const colorLines = renderLineByLine(lines);

  buildHighlight(lines, colorLines);
  buildGutter(lines);
  buildWarnPanel();
}

// ── Line-by-line renderer ─────────────────────────────────────
// Parses each line independently so empty/whitespace lines produce
// an empty string (not omitted), keeping code ↔ highlight in sync.
// Warning characters (⚠ ?) are stripped so no extra characters
// appear in the highlight that would shift the textarea cursor.
function renderLineByLine(lines) {
  return lines.map(line => {
    if (!line.trim()) return '';   // blank/whitespace → empty, preserves position
    try {
      const blocks = parser.parse(line);
      // Render tokens only — no warning text characters
      return renderBlocksNoWarnText(blocks);
    } catch(e) {
      return esc(line);
    }
  });
}

// Render blocks to HTML, omitting the ⚠/? warning text characters
// that _warnSpan() produces. Warning context comes from the full AST.
function renderBlocksNoWarnText(blocks) {
  function blockHtml(b) {
    if (b.type === 'empty') return '';
    const indent = ' '.repeat(b.indent);
    const toks   = b.tokens.map(([type, value]) =>
      type === 'space' ? esc(value || ' ') : `<span class="${type}">${esc(value)}</span>`
    ).join('');
    // children inline on same "line" for single-line parse
    const kids = b.children.map(blockHtml).filter(Boolean).join('\n');
    return indent + toks + (kids ? '\n' + kids : '');
  }
  return blocks.map(blockHtml).filter(Boolean).join('\n');
}

// ── Collect warnings ─────────────────────────────────────────
function collectWarnings(blocks, lines) {
  const out = [];
  (function walk(bs) {
    for (const b of bs) {
      if (b.warnings && b.warnings.length) {
        const t = b.raw ? b.raw.trim() : '';
        let ln  = 0;
        for (let i = 0; i < lines.length; i++) {
          if (lines[i].trim() === t) { ln = i; break; }
        }
        b.warnings.forEach(w => out.push({line: ln, message: w.message}));
      }
      if (b.children) walk(b.children);
    }
  })(blocks);
  return out;
}

// ── Build highlight ───────────────────────────────────────────
function buildHighlight(lines, colorLines) {
  const warnSet = new Set(warnings.map(w => w.line));
  let html = '';
  for (let i = 0; i < lines.length; i++) {
    let cls = 'hl-line';
    if (i === activeLine) cls += ' active';
    if (warnSet.has(i))   cls += ' warn';
    // ​ keeps empty lines at full line-height
    html += `<span class="${cls}">${colorLines[i] || '\u200b'}\n</span>`;
  }
  html += '<span class="hl-line">\u200b</span>';
  hlEl.innerHTML = html;

  const padPx = parseFloat(getComputedStyle(hlEl).paddingTop) || 12;
  const minH  = Math.max(scrollEl.clientHeight, padPx * 2 + (lines.length + 1) * LH);
  hlEl.style.minHeight    = minH + 'px';
  inputEl.style.minHeight = minH + 'px';
}

// ── Build gutter ──────────────────────────────────────────────
function buildGutter(lines) {
  const warnSet = new Set(warnings.map(w => w.line));
  let html = '';
  for (let i = 0; i < lines.length; i++) {
    let cls = 'gn';
    if (i === activeLine) cls += ' act';
    if (warnSet.has(i))   cls += ' warn';
    html += `<span class="${cls}" data-ln="${i}">${i + 1}</span>`;
  }
  gutterIn.innerHTML = html;
}

// ── Build warn panel ──────────────────────────────────────────
function buildWarnPanel() {
  wcEl.textContent = warnings.length || '';
  wlist.innerHTML  = warnings.map(w =>
    `<div class="we" data-ln="${w.line}">` +
    `<span class="we-ln">L${w.line + 1}</span>` +
    `<span>${esc(w.message)}</span></div>`
  ).join('');
  wlist.querySelectorAll('.we').forEach(el =>
    el.addEventListener('click', () => goToLine(+el.dataset.ln))
  );
}

function goToLine(ln) {
  const lines = inputEl.value.split('\n');
  let pos = 0;
  for (let i = 0; i < Math.min(ln, lines.length); i++) pos += lines[i].length + 1;
  inputEl.focus();
  inputEl.setSelectionRange(pos, pos);
  activeLine = ln;
  const padTop = parseFloat(getComputedStyle(hlEl).paddingTop) || 12;
  scrollEl.scrollTop = Math.max(0, padTop + ln * LH - scrollEl.clientHeight / 2);
  scheduleRender();
}

// ── Warn bar toggle ───────────────────────────────────────────
document.getElementById('wbar-hdr').addEventListener('click', () => {
  wbar.classList.toggle('open');
  wtEl.textContent = wbar.classList.contains('open') ? '▼' : '▶';
});

// ── Tooltips ──────────────────────────────────────────────────
gutterIn.addEventListener('mousemove', e => {
  const el = e.target.closest('.gn.warn');
  if (!el) { hideTip(); return; }
  const msgs = warnings.filter(w => w.line === +el.dataset.ln).map(w => w.message);
  showTip(e, msgs.join('\n'));
});
gutterIn.addEventListener('mouseleave', hideTip);

function showTip(e, text) {
  tipEl.textContent   = text;
  tipEl.style.display = 'block';
  const x = e.clientX + 12, y = e.clientY - 8;
  tipEl.style.left = Math.min(x, innerWidth  - tipEl.offsetWidth  - 8) + 'px';
  tipEl.style.top  = Math.min(y, innerHeight - tipEl.offsetHeight - 8) + 'px';
}
function hideTip() { tipEl.style.display = 'none'; }

// ── Active line ───────────────────────────────────────────────
function updateActiveLine() {
  activeLine = inputEl.value.slice(0, inputEl.selectionStart).split('\n').length - 1;
}

// ── Autocomplete ──────────────────────────────────────────────
function wordAtCursor() {
  const pos = inputEl.selectionStart, v = inputEl.value;
  let s = pos;
  while (s > 0 && /[a-zA-Z0-9_.]/.test(v[s - 1])) s--;
  return { word: v.slice(s, pos), start: s, end: pos };
}

function triggerAC() {
  const { word } = wordAtCursor();
  if (word.length < 1) { closeAC(); return; }
  const lc = word.toLowerCase();
  const matches = acData
    .filter(e => e.id.toLowerCase().includes(lc))
    .sort((a, b) => {
      const ap = a.id.toLowerCase().startsWith(lc) ? 0 : 1;
      const bp = b.id.toLowerCase().startsWith(lc) ? 0 : 1;
      return ap - bp || a.id.length - b.id.length;
    })
    .slice(0, 40);
  if (!matches.length) { closeAC(); return; }
  acItems = matches; acSel = 0; acOpen = true;
  renderAC(); positionAC();
}

function renderAC() {
  const { word } = wordAtCursor();
  acEl.innerHTML = acItems.map((it, i) =>
    `<div class="aci${i === acSel ? ' sel' : ''}" data-i="${i}">` +
    `<span class="aci-name">${hlMatch(it.id, word)}</span>` +
    `<span class="aci-kind">${it.type}${it.ret ? ' → ' + it.ret : ''}</span></div>`
  ).join('');
  acEl.querySelectorAll('.aci').forEach(el =>
    el.addEventListener('mousedown', e => { e.preventDefault(); applyAC(+el.dataset.i); })
  );
  acEl.style.display = 'block';
}

function positionAC() {
  const rect = scrollEl.getBoundingClientRect();
  const padT = parseFloat(getComputedStyle(hlEl).paddingTop)  || 12;
  const padL = parseFloat(getComputedStyle(hlEl).paddingLeft) || 14;
  const x = rect.left + gutterEl.offsetWidth + padL;
  const y = rect.top  + padT + (activeLine + 1) * LH - scrollEl.scrollTop;
  acEl.style.left = Math.min(x, innerWidth  - 260) + 'px';
  acEl.style.top  = Math.min(y, innerHeight - 220) + 'px';
}

function moveAC(d) {
  acSel = Math.max(0, Math.min(acItems.length - 1, acSel + d));
  acEl.querySelectorAll('.aci').forEach((el, i) => el.classList.toggle('sel', i === acSel));
  acEl.querySelector('.aci.sel')?.scrollIntoView({ block: 'nearest' });
}

function applyAC(idx) {
  if (idx === undefined) idx = acSel;
  const item = acItems[idx]; if (!item) return;
  const { word, start, end } = wordAtCursor();
  const v = inputEl.value;
  inputEl.value = v.slice(0, start) + item.id + v.slice(end);
  inputEl.setSelectionRange(start + item.id.length, start + item.id.length);
  closeAC(); updateActiveLine(); scheduleRender();
}

function closeAC() { acOpen = false; acEl.style.display = 'none'; }

function hlMatch(str, q) {
  if (!q) return esc(str);
  const i = str.toLowerCase().indexOf(q.toLowerCase());
  if (i < 0) return esc(str);
  return esc(str.slice(0, i))
    + `<span class="aci-m">${esc(str.slice(i, i + q.length))}</span>`
    + esc(str.slice(i + q.length));
}

// ── Input events ──────────────────────────────────────────────
inputEl.addEventListener('input', () => {
  updateActiveLine(); triggerAC(); scheduleRender();
});

inputEl.addEventListener('keydown', e => {
  if (acOpen) {
    if (e.key === 'ArrowDown') { e.preventDefault(); moveAC(1);  return; }
    if (e.key === 'ArrowUp')   { e.preventDefault(); moveAC(-1); return; }
    if (e.key === 'Enter')     { e.preventDefault(); applyAC();  return; }
    if (e.key === 'Tab')       { e.preventDefault(); applyAC();  return; }
    if (e.key === 'Escape')    { e.preventDefault(); closeAC();  return; }
    // Cursor movement: close AC but let the key act normally (NO return, NO preventDefault)
    if (['ArrowLeft','ArrowRight','Home','End'].includes(e.key)) { closeAC(); }
  }
  if (e.key === 'Tab' && !acOpen) {
    e.preventDefault();
    const s = inputEl.selectionStart, en = inputEl.selectionEnd;
    inputEl.value = inputEl.value.slice(0, s) + '  ' + inputEl.value.slice(en);
    inputEl.setSelectionRange(s + 2, s + 2);
    updateActiveLine(); scheduleRender();
  }
});

inputEl.addEventListener('keyup', e => {
  updateActiveLine();
  scheduleRender();
});

inputEl.addEventListener('click',  () => { updateActiveLine(); closeAC(); scheduleRender(); });
inputEl.addEventListener('select', () => { updateActiveLine(); scheduleRender(); });
inputEl.addEventListener('paste',  () => { setTimeout(() => { updateActiveLine(); closeAC(); scheduleRender(); }, 0); });

document.addEventListener('mousedown', e => {
  if (!acEl.contains(e.target) && e.target !== inputEl) closeAC();
});

// ── Resize ────────────────────────────────────────────────────
new ResizeObserver(() => { measureLH(); scheduleRender(); }).observe(scrollEl);

// ── Utils ─────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────────────────────
const _DEFAULT = `// Cuando se activa, la piedra sigue
// continuamente las instrucciones que se le
// indiquen.
// Estas deben grabarse en petroscripto.
// Más información en:
// StoneStoryRPG.com/stonescript
// (Bezerra, el Sabio)

import UI/MindstoneButton
import UI/BetterInfo2

?loc=caves
 ?loc.begin
  brew tar
  equipR compound
  equipL trisk
 :?DBash()
  return
 :?hp<=foe.damage
  activate P
:?loc=rocky
 loc.Leave()


func DBash()
 return Dash() | Bash()
func BDash()
 return Bash() | Dash()
func Dash()
 return Shield("dash")
func Bash()
 return Shield("bash")

func Shield(s)
 ?item.GetCooldown(s)<=0 & foe.distance>10 & foe.distance<17
  equipR @s@
  equipl trisk
  return true
 return false`;

// Carga desde el hash de la URL: editor.html#?foe="pallas"%0A  equipR sword
// Para generar el enlace: location.hash = encodeURIComponent(tuCodigo)
function loadFromHash() {
  const hash = window.location.hash.slice(1);
  if (!hash) return null;
  try {
    const decoded = decodeURIComponent(hash);
    if (decoded && decoded.length > 0) return decoded;
  } catch(e) {}
  return null;
}

inputEl.value = loadFromHash() || _DEFAULT;
updateActiveLine();
scheduleRender();


})();
</script>
</body>
</html>
